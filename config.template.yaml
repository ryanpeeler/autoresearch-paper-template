# ============================================================================
# AutoResearchClaw Paper Configuration
# ============================================================================
# Copy this file to config.yaml and customize the sections marked CUSTOMIZE.
# Everything else has sensible defaults for review/analytical articles.
# ============================================================================

# ---------------------------------------------------------------------------
# CUSTOMIZE: Project metadata
# ---------------------------------------------------------------------------
project:
  name: "my-paper"                    # Short kebab-case project name
  # Mode options:
  #   "docs-first"  — Review/analytical article (no experiments)
  #   "full-auto"   — Empirical paper with experiments
  #   "semi-auto"   — Pause at gate stages for human review
  mode: "docs-first"

# ---------------------------------------------------------------------------
# CUSTOMIZE: Research topic and domains
# ---------------------------------------------------------------------------
research:
  topic: >-
    Replace this with your research topic. Be specific and detailed.
    Include scope (e.g., "U.S. only"), tone (e.g., "neutral, analytical"),
    what to include, and what to exclude.
  domains:
    - "domain 1"
    - "domain 2"
    - "domain 3"
  daily_paper_count: 12
  quality_threshold: 3.5
  graceful_degradation: true

# ---------------------------------------------------------------------------
# CUSTOMIZE: Author (used by generate_pdf.py)
# ---------------------------------------------------------------------------
author: "Your Name"

# ---------------------------------------------------------------------------
# Runtime
# ---------------------------------------------------------------------------
runtime:
  timezone: "America/New_York"
  max_parallel_tasks: 3
  approval_timeout_hours: 12
  retry_limit: 2

# ---------------------------------------------------------------------------
# LLM Provider — ACP (Claude Max subscription via claude CLI)
# No API keys needed. Uses claude --print for non-interactive prompts.
# ---------------------------------------------------------------------------
llm:
  provider: "acp"
  base_url: ""
  api_key_env: ""
  api_key: ""
  primary_model: ""
  fallback_models: []

  acp:
    agent: "claude"
    model: ""
    session_reuse: true

# ---------------------------------------------------------------------------
# Experiment — simulated for review articles, sandbox for empirical
# ---------------------------------------------------------------------------
experiment:
  mode: "simulated"
  time_budget_sec: 300
  max_iterations: 10
  metric_key: "primary_metric"
  metric_direction: "minimize"

  sandbox:
    python_path: ".venv/bin/python3"
    gpu_required: false
    max_memory_mb: 4096

  code_agent:
    enabled: true
    architecture_planning: true
    multi_file: true
    review_enabled: true
    max_repair_rounds: 5

  opencode:
    enabled: false

  figure_agent:
    enabled: true
    min_figures: 3
    max_figures: 8
    max_iterations: 3
    render_timeout_sec: 30
    output_format: "python"
    nano_banana_enabled: false
    strict_mode: false
    dpi: 300

# ---------------------------------------------------------------------------
# Security & Approval Gates
# ---------------------------------------------------------------------------
security:
  hitl_required_stages: [5, 9, 20]
  allow_publish_without_approval: false
  redact_sensitive_logs: true

# ---------------------------------------------------------------------------
# Knowledge Base
# ---------------------------------------------------------------------------
knowledge_base:
  backend: "markdown"
  root: "docs/kb"

# ---------------------------------------------------------------------------
# Notifications
# ---------------------------------------------------------------------------
notifications:
  channel: "console"
  target: ""
  on_stage_start: true
  on_stage_fail: true
  on_gate_required: true

# ---------------------------------------------------------------------------
# Export
# ---------------------------------------------------------------------------
export:
  format: "neurips2025"
  latex_engine: "pdflatex"

# ---------------------------------------------------------------------------
# Bridges — disabled by default
# ---------------------------------------------------------------------------
openclaw_bridge:
  use_cron: false
  use_message: false
  use_memory: false
  use_sessions_spawn: false
  use_web_fetch: false
  use_browser: false

metaclaw_bridge:
  enabled: false

prompts:
  custom_file: ""
